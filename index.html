<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download de Arquivos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #74b9ff, #a29bfe);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: white;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        .icon {
            font-size: 50px;
            color: #6c5ce7;
            margin-bottom: 15px;
        }

        h1 {
            color: #2d3436;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .description {
            color: #636e72;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .download-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-download {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: white;
            text-decoration: none;
            padding: 15px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        /* Estilo do botão Client */
        .btn-client {
            background-color: #0984e3;
            box-shadow: 0 4px 12px rgba(9, 132, 227, 0.3);
        }

        .btn-client:hover {
            background-color: #076bba;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(9, 132, 227, 0.4);
        }

        /* Estilo do botão Textura */
        .btn-textura {
            background-color: #6c5ce7;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
        }

        .btn-textura:hover {
            background-color: #5b4bc4;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(108, 92, 231, 0.4);
        }

        /* Estilo do botão X */
        .btn-x {
            background-color: #e17055;
            box-shadow: 0 4px 12px rgba(225, 112, 85, 0.3);
        }

        .btn-x:hover {
            background-color: #d05f43;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(225, 112, 85, 0.4);
        }

        .btn-download:active {
            transform: translateY(1px);
        }

        .footer {
            margin-top: 30px;
            font-size: 11px;
            color: #b2bec3;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">📥</div>
        
        <h1>Downloads Disponíveis</h1>
        <p class="description">Selecione abaixo o componente que deseja baixar. Todos os links iniciam o download direto de forma segura.</p>
        
        <div class="download-box">
            <a href="https://drive.google.com/uc?export=download&id=1zGkwDzxZQTG5Zl3hrIA5Me-2xQWC4La7" class="btn-download btn-client">
                <span>📦</span> Baixar Client
            </a>

            <a href="https://drive.google.com/uc?export=download&id=1P_ENBKYpfmDGHocatdTNzCzorLrmgNrW" class="btn-download btn-textura">
                <span>🎨</span> Baixar Textura
            </a>

            <a href="https://drive.google.com/uc?export=download&id=1yEWGtEAPTv70ynGgQdehoyEEUN9Kb2Jo" class="btn-download btn-x">
                <span>🔥</span> Baixar VPN
            </a>
        </div>

        <div class="footer">
            Links diretos e seguros via Google Drive.
        </div>
    </div>

</body>
</html>
